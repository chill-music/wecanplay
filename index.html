<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameZone - Jackaroo</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/clouds/100/controller.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6c5ce7; --secondary: #a29bfe; --dark: #1a1a2e; --darker: #16213e; --light: #eee; --success: #00b894; --danger: #d63031; --gold: #fdcb6e;
            --red: #e74c3c; --blue: #3498db; --green: #27ae60; --yellow: #f1c40f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--dark); color: var(--light); min-height: 100vh; overflow-x: hidden; }
        
        /* --- General UI & Lobby (Restored & Fixed) --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--darker); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-img { width: 40px; height: 40px; border-radius: 10px; }
        .logo { font-size: 1.8rem; font-weight: 700; color: var(--light); }
        .logo span { color: var(--primary); display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); color: #a29bfe; } 100% { transform: scale(1); } }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .btn-standard { background: var(--primary); border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-standard:hover { background: #5a4ad1; }
        
        .container { padding: 30px 5%; display: flex; gap: 30px; flex-wrap: wrap; }
        
        /* Profile Card (Fixed) */
        .profile-card { flex: 1; min-width: 300px; background: var(--darker); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .avatar-box { width: 100px; height: 100px; margin: 0 auto 15px; position: relative; }
        .avatar-box img { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--primary); object-fit: cover; }
        .level-badge { position: absolute; bottom: 0; right: 0; background: var(--primary); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid var(--dark); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 0.7rem; color: #aaa; }

        /* Lobby Section */
        .lobby-section { flex: 2; min-width: 300px; }
        .section-title { font-size: 1.5rem; margin-bottom: 20px; border-left: 4px solid var(--primary); padding-left: 15px; }
        .join-room-box { background: var(--darker); padding: 20px; border-radius: 15px; margin-bottom: 30px; display: flex; gap: 15px; align-items: center; }
        .join-room-box input { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid #444; background: #222; color: white; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        
        /* Game Cards Grid */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .game-card { background: linear-gradient(145deg, var(--darker), #222); border-radius: 15px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid transparent; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .game-header { height: 120px; background-size: cover; background-position: center; position: relative; }
        .game-title { position: absolute; bottom: 10px; left: 10px; font-size: 1.4rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .game-body { padding: 15px; }

        /* --- GAME ROOM UI (Jackaroo Specific) --- */
        #game-room { display: none; height: 100vh; width: 100%; background: #34495e; position: relative; overflow: hidden; flex-direction: column; }
        
        /* Game Info Panel (Top Right) */
        .game-info-panel { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; width: 220px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); z-index: 10; }
        .room-code-display { font-size: 1.8rem; font-weight: bold; color: var(--primary); letter-spacing: 3px; text-align: center; margin-bottom: 5px; }
        .copy-code-btn { background: transparent; border: 1px solid #555; color: #aaa; width: 100%; padding: 5px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; transition: 0.2s; }
        .copy-code-btn:hover { background: var(--primary); color: white; }
        
        /* Board Layout */
        .board-area { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; padding-bottom: 120px; }
        .board-wrapper { width: 600px; height: 600px; position: relative; background: #ecf0f1; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Bases (Homes) */
        .base-zone { position: absolute; width: 200px; height: 200px; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .base-zone.red { top: 20px; left: 20px; background: #e74c3c; border-radius: 15px 0 30px 15px; }
        .base-zone.blue { top: 20px; right: 20px; background: #3498db; border-radius: 15px 15px 15px 30px; }
        .base-zone.green { bottom: 20px; right: 20px; background: #27ae60; border-radius: 15px 30px 15px 15px; }
        .base-zone.yellow { bottom: 20px; left: 20px; background: #f1c40f; border-radius: 30px 15px 15px 15px; }
        
        .player-info-board { text-align: center; margin-bottom: 5px; color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .player-info-board img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; margin-bottom: 5px; }
        
        /* Marbles inside Home (The 4 marbles) */
        .home-marbles-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; }
        .marble-placeholder { width: 35px; height: 35px; background: rgba(255,255,255,0.3); border-radius: 50%; border: 2px dashed rgba(255,255,255,0.5); display: flex; justify-content: center; align-items: center; }
        .marble { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; transition: all 0.2s; box-shadow: inset -2px -2px 5px rgba(0,0,0,0.3), inset 2px 2px 5px rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.4); }
        .marble:hover { transform: scale(1.2); box-shadow: 0 0 10px white; }
        .marble.m-red { background: #c0392b; }
        .marble.m-blue { background: #2980b9; }
        .marble.m-green { background: #1e8449; }
        .marble.m-yellow { background: #d4ac0d; }

        /* Finish Zone (Center) */
        .finish-zone { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; background: #2c3e50; border-radius: 50%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; padding: 10px; z-index: 5; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .finish-spot { width: 35px; height: 35px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px dashed rgba(255,255,255,0.3); }

        /* Track Points */
        .track-point { position: absolute; width: 20px; height: 20px; background: #bdc3c7; border-radius: 50%; border: 1px solid #95a5a6; text-align: center; line-height: 20px; font-size: 10px; color: #333; cursor: pointer; z-index: 2; }
        .track-point.colored { border: 3px solid; background: white; }
        .track-point.colored.red { border-color: var(--red); }
        .track-point.colored.blue { border-color: var(--blue); }
        .track-point.colored.green { border-color: var(--green); }
        .track-point.colored.yellow { border-color: var(--yellow); }

        /* Cards UI (Fixed & Correct) */
        .hand-container { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 20px; z-index: 20; border: 2px solid #333; }
        .card { width: 60px; height: 90px; background: white; border-radius: 6px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 10px rgba(0,0,0,0.3); position: relative; padding: 3px; }
        .card:hover { transform: translateY(-15px); box-shadow: 0 10px 20px rgba(108, 92, 231, 0.5); }
        .card-value { font-size: 2rem; color: #333; line-height: 1; }
        .card-desc { font-size: 0.5rem; color: #7f8c8d; text-align: center; width: 100%; background: #eee; padding: 2px; }
        .card.special { background: linear-gradient(135deg, #fff, #f1c40f); color: #d35400; }
        .card.burn { background: linear-gradient(135deg, #fff, #e74c3c); color: #c0392b; }
        .card.selected { border: 3px solid var(--gold); transform: translateY(-20px); }

        /* Popups */
        .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
        .popup-content { background: var(--darker); padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--primary); }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen" style="display: none; height: 100vh; justify-content: center; align-items: center;">
        <div style="text-align: center;">
            <div class="logo-container" style="justify-content: center; margin-bottom: 20px;">
                <img src="https://img.icons8.com/clouds/100/controller.png" class="logo-img" style="width: 60px; height: 60px;">
                <div class="logo">Game<span>Zone</span></div>
            </div>
            <button id="google-login-btn" style="background: white; color: #444; padding: 15px 30px; border-radius: 30px; font-size: 1.1rem; cursor: pointer; font-weight: bold;">
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- Main App (Lobby) -->
    <div id="main-app" style="display: none;">
        <nav>
            <div class="logo-container">
                <img src="https://img.icons8.com/clouds/100/controller.png" class="logo-img" alt="Logo">
                <div class="logo">Game<span>Zone</span></div>
            </div>
            <div class="nav-right">
                <div style="color: var(--gold); font-weight: bold;">🪙 <span id="nav-coins">0</span></div>
                <button class="lang-switch" onclick="toggleLanguage()"><span id="lang-btn-text">AR</span></button>
                <div class="user-mini" style="display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.1); padding:5px 15px; border-radius:20px;">
                    <img id="nav-avatar" src="" alt="Avatar" style="width:30px; height:30px; border-radius:50%;">
                    <span id="nav-name">User</span>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="profile-card">
                <div class="avatar-box">
                    <img id="profile-avatar" src="" alt="Avatar">
                    <div class="level-badge" id="profile-level">1</div>
                </div>
                <h2 id="profile-name">Loading...</h2>
                <div class="user-id-box" onclick="copyID()" style="background: #222; padding: 8px; border-radius: 8px; margin: 10px 0; cursor: pointer;">
                    <span>ID: <span id="profile-uid" style="color:var(--primary)">...</span></span> 📋
                </div>
                <div class="stats-grid">
                    <div class="stat-box"><div class="stat-val" id="stat-wins">0</div><div class="stat-label">Wins</div></div>
                    <div class="stat-box"><div class="stat-val" id="stat-losses">0</div><div class="stat-label">Loss</div></div>
                    <div class="stat-box"><div class="stat-val" id="stat-coins" style="color:var(--gold)">0</div><div class="stat-label">Coins</div></div>
                </div>
                <button onclick="signOutUser()" style="margin-top: 20px; background: var(--danger); border: none; color: white; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer;">Sign Out</button>
            </div>

            <div class="lobby-section">
                <div class="join-room-box">
                    <input type="text" id="join-code-input" placeholder="ENTER ROOM CODE" maxlength="4">
                    <button class="btn-standard" onclick="joinRoom()">Join Game</button>
                </div>

                <h2 class="section-title">Choose Your Game</h2>
                <div class="game-grid">
                    <!-- Jackaroo Card -->
                    <div class="game-card">
                        <div class="game-header" style="background: url('https://images.unsplash.com/photo-1606167668584-78701c57f13d?auto=format&fit=crop&w=400') center/cover;">
                            <div class="game-title">Jackaroo</div>
                        </div>
                        <div class="game-body">
                            <p style="font-size:0.85rem; color:#aaa; margin-bottom:10px;">Strategic marble game. Move your 4 marbles home.</p>
                            <button class="btn-standard" style="width:100%;" onclick="createRoom('jackaroo')">Play Now</button>
                        </div>
                    </div>
                    <!-- UNO Card -->
                    <div class="game-card">
                        <div class="game-header" style="background: linear-gradient(45deg, #ff9a9e, #fecfef);">
                            <div class="game-title" style="color:#c0392b">UNO</div>
                        </div>
                        <div class="game-body">
                            <p style="font-size:0.85rem; color:#aaa; margin-bottom:10px;">Classic card game.</p>
                            <button class="btn-standard" style="width:100%;" onclick="createRoom('uno')">Play Now</button>
                        </div>
                    </div>
                    <!-- Dominoes Card -->
                    <div class="game-card">
                        <div class="game-header" style="background: url('https://images.unsplash.com/photo-1541278107931-e006523892df?auto=format&fit=crop&w=400') center/cover;">
                            <div class="game-title">Dominoes</div>
                        </div>
                        <div class="game-body">
                            <p style="font-size:0.85rem; color:#aaa; margin-bottom:10px;">Tile matching game.</p>
                            <button class="btn-standard" style="width:100%;" onclick="createRoom('dominoes')">Play Now</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- GAME ROOM (Jackaroo) -->
    <div id="game-room">
        <div class="game-info-panel">
            <div style="text-transform:uppercase; font-size:0.8rem; color:#aaa; text-align:center;">Room Code</div>
            <div class="room-code-display" id="room-code-display">A1B2</div>
            <button class="copy-code-btn" onclick="copyRoomCode()">Copy Code</button>
            <div class="player-turn-box" style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; text-align: center;">
                <div style="font-size:0.8rem; color:#aaa;">Turn</div>
                <div id="turn-name" style="font-weight:bold; color:var(--primary);">Player 1</div>
            </div>
            <button onclick="exitGame()" style="margin-top:15px; width:100%; background: var(--danger); border:none; padding:8px; border-radius:5px; color:white; cursor:pointer;">Exit Room</button>
        </div>

        <div class="board-area">
            <div class="board-wrapper" id="board-wrapper">
                <!-- Red Base (Top Left) -->
                <div class="base-zone red">
                    <div class="player-info-board">
                        <img src="https://i.pravatar.cc/150?img=1">
                        <div>Player 1</div>
                    </div>
                    <div class="home-marbles-grid" id="home-red">
                        <div class="marble-placeholder"><div class="marble m-red"></div></div>
                        <div class="marble-placeholder"><div class="marble m-red"></div></div>
                        <div class="marble-placeholder"><div class="marble m-red"></div></div>
                        <div class="marble-placeholder"><div class="marble m-red"></div></div>
                    </div>
                </div>

                <!-- Blue Base (Top Right) -->
                <div class="base-zone blue">
                    <div class="player-info-board">
                        <img src="https://i.pravatar.cc/150?img=2">
                        <div>Player 2</div>
                    </div>
                    <div class="home-marbles-grid" id="home-blue">
                        <div class="marble-placeholder"><div class="marble m-blue"></div></div>
                        <div class="marble-placeholder"><div class="marble m-blue"></div></div>
                        <div class="marble-placeholder"><div class="marble m-blue"></div></div>
                        <div class="marble-placeholder"><div class="marble m-blue"></div></div>
                    </div>
                </div>

                <!-- Green Base (Bottom Right) -->
                <div class="base-zone green">
                    <div class="player-info-board">
                        <img src="https://i.pravatar.cc/150?img=3">
                        <div>Player 3</div>
                    </div>
                    <div class="home-marbles-grid" id="home-green">
                        <div class="marble-placeholder"><div class="marble m-green"></div></div>
                        <div class="marble-placeholder"><div class="marble m-green"></div></div>
                        <div class="marble-placeholder"><div class="marble m-green"></div></div>
                        <div class="marble-placeholder"><div class="marble m-green"></div></div>
                    </div>
                </div>

                <!-- Yellow Base (Bottom Left) -->
                <div class="base-zone yellow">
                    <div class="player-info-board">
                        <img src="https://i.pravatar.cc/150?img=4">
                        <div>Player 4</div>
                    </div>
                    <div class="home-marbles-grid" id="home-yellow">
                        <div class="marble-placeholder"><div class="marble m-yellow"></div></div>
                        <div class="marble-placeholder"><div class="marble m-yellow"></div></div>
                        <div class="marble-placeholder"><div class="marble m-yellow"></div></div>
                        <div class="marble-placeholder"><div class="marble m-yellow"></div></div>
                    </div>
                </div>

                <!-- Finish Zone (Center) -->
                <div class="finish-zone">
                    <div class="finish-spot" style="border-color: var(--red);"></div>
                    <div class="finish-spot" style="border-color: var(--blue);"></div>
                    <div class="finish-spot" style="border-color: var(--yellow);"></div>
                    <div class="finish-spot" style="border-color: var(--green);"></div>
                </div>
            </div>
        </div>

        <!-- Player Hand -->
        <div class="hand-container" id="player-hand">
            <!-- Cards generated by JS -->
        </div>
    </div>

    <!-- Popup for Card Selection (Split 7, Choice 1/13) -->
    <div id="choice-popup" class="popup">
        <div class="popup-content">
            <h3 id="popup-title">Choose Action</h3>
            <div id="popup-buttons" style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
                <!-- Buttons injected by JS -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4_l9ZUfCzRAZfqC1-7eWhnp8ftMFbKmM",
            authDomain: "appforgames-d392f.firebaseapp.com",
            projectId: "appforgames-d392f",
            storageBucket: "appforgames-d392f.firebasestorage.app",
            messagingSenderId: "586730925650",
            appId: "1:586730925650:web:d452dd19248780578f798b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUserData = null;

        // Views
        const loginScreen = document.getElementById('login-screen');
        const mainApp = document.getElementById('main-app');
        const gameRoom = document.getElementById('game-room');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loginScreen.style.display = 'none';
                mainApp.style.display = 'block';
                gameRoom.style.display = 'none';
                await handleUser(user);
            } else {
                loginScreen.style.display = 'flex';
                mainApp.style.display = 'none';
                gameRoom.style.display = 'none';
            }
        });

        async function handleUser(user) {
            const userRef = doc(db, "users", user.uid);
            const docSnap = await getDoc(userRef);
            if (docSnap.exists()) {
                currentUserData = docSnap.data();
                updateMainUI(user, currentUserData);
            } else {
                const newUser = { uid: user.uid, name: user.displayName, photoURL: user.photoURL, coins: 500, wins: 0, losses: 0, level: 1, friends: [] };
                await setDoc(userRef, newUser);
                currentUserData = newUser;
                updateMainUI(user, newUser);
            }
        }

        function updateMainUI(user, data) {
            document.getElementById('nav-avatar').src = user.photoURL;
            document.getElementById('nav-name').innerText = user.displayName;
            document.getElementById('nav-coins').innerText = data.coins;
            
            document.getElementById('profile-avatar').src = user.photoURL;
            document.getElementById('profile-name').innerText = user.displayName;
            document.getElementById('profile-level').innerText = data.level;
            document.getElementById('stat-wins').innerText = data.wins;
            document.getElementById('stat-losses').innerText = data.losses;
            document.getElementById('stat-coins').innerText = data.coins;
            document.getElementById('profile-uid').innerText = "GZ-" + Math.random().toString(36).substr(2, 4).toUpperCase();
        }
        
        // Restore Functions
        window.toggleLanguage = () => alert("Language toggle logic here");
        window.copyID = () => alert("ID Copied!");
        document.getElementById('google-login-btn').addEventListener('click', () => signInWithPopup(auth, provider));
        window.signOutUser = () => signOut(auth);

        // Room Logic
        function generateShortCode() { return Math.random().toString(36).substr(2, 4).toUpperCase(); }
        
        window.createRoom = (gameName) => {
             if(gameName === 'jackaroo') {
                 initGameBoard(generateShortCode());
             } else {
                 alert("This game is not ready yet!");
             }
        }
        window.joinRoom = () => {
            const code = document.getElementById('join-code-input').value;
            if(code) initGameBoard(code.toUpperCase());
        }

        // Game Logic
        function initGameBoard(code) {
            mainApp.style.display = 'none';
            gameRoom.style.display = 'flex'; // Using flex for layout
            document.getElementById('room-code-display').innerText = code;
            drawTrack();
            dealCards();
        }

        window.exitGame = () => {
            gameRoom.style.display = 'none';
            mainApp.style.display = 'block';
        }
        window.copyRoomCode = () => {
             navigator.clipboard.writeText(document.getElementById('room-code-display').innerText);
             alert("Code Copied!");
        }

        // --- DRAW BOARD TRACK ---
        function drawTrack() {
            const wrapper = document.getElementById('board-wrapper');
            // Clear old points if any (except bases)
            document.querySelectorAll('.track-point').forEach(el => el.remove());

            // We will place points on the outer loop manually using percentages for simplicity
            // Total points approx 60 (15 per side)
            const pointsPerSide = 15;
            const totalPoints = 60;
            
            // Function to create point
            const createPoint = (id, top, left, colorClass = '') => {
                const el = document.createElement('div');
                el.className = `track-point ${colorClass}`;
                el.id = `pt-${id}`;
                el.style.top = top + '%';
                el.style.left = left + '%';
                el.style.transform = 'translate(-50%, -50%)';
                wrapper.appendChild(el);
            };

            // Generate Loop
            for(let i = 0; i < totalPoints; i++) {
                let top, left, color = '';
                
                // Top Side (Left to Right) - Index 0-13
                if (i < 15) {
                    top = 35; 
                    left = 5 + (i * 3); // 5% to 50%
                    // Red start is usually at index 0 or 1
                    if (i === 0) color = 'colored red'; // Red Entry
                }
                // Right Side (Top to Bottom) - Index 15-29
                else if (i < 30) {
                    left = 95; // Fixed right
                    top = 35 + ((i - 15) * 3); 
                    if (i === 15) color = 'colored blue'; // Blue Entry
                }
                // Bottom Side (Right to Left) - Index 30-44
                else if (i < 45) {
                    top = 95; 
                    left = 95 - ((i - 30) * 3); 
                    if (i === 30) color = 'colored green'; // Green Entry
                }
                // Left Side (Bottom to Top) - Index 45-59
                else {
                    left = 5;
                    top = 95 - ((i - 45) * 3);
                    if (i === 45) color = 'colored yellow'; // Yellow Entry
                }
                
                createPoint(i, top, left, color);
            }
        }

        // --- CARD MECHANICS ---
        function dealCards() {
            const hand = document.getElementById('player-hand');
            hand.innerHTML = '';
            
            // Card Definitions based on user request
            const cards = [
                { v: "1", d: "Out/1 Step", action: "choice_one" },
                { v: "2", d: "2 Steps", action: "move_2" },
                { v: "4", d: "Back 4", action: "back_4" },
                { v: "7", d: "Split 7", action: "split_7" },
                { v: "10", d: "Move/Burn", action: "choice_ten" },
                { v: "11", d: "11 Steps", action: "move_11" },
                { v: "13", d: "Out/13/Kill", action: "choice_thirteen" },
                { v: "Q", d: "Burn Choice", action: "burn_q" } // The 'Bint' card
            ];

            // Deal random cards
            for(let i=0; i<4; i++) {
                const cardData = cards[Math.floor(Math.random() * cards.length)];
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                // Add specific styles
                if(cardData.v === '10' || cardData.v === 'Q') cardEl.classList.add('burn');
                if(cardData.v === '7' || cardData.v === '13') cardEl.classList.add('special');

                cardEl.innerHTML = `
                    <div class="card-value">${cardData.v}</div>
                    <div class="card-desc">${cardData.d}</div>
                `;
                
                // Click Handler
                cardEl.onclick = () => playCard(cardData, cardEl);
                hand.appendChild(cardEl);
            }
        }

        function playCard(card, element) {
            // Highlight card
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');

            const popup = document.getElementById('choice-popup');
            const title = document.getElementById('popup-title');
            const btns = document.getElementById('popup-buttons');
            
            // Logic Handling
            if(card.action === 'choice_one') {
                popup.style.display = 'flex';
                title.innerText = "Card 1: Choose Move";
                btns.innerHTML = `
                    <button class="btn-standard" onclick="resolveMove('enter')">Enter Marble</button>
                    <button class="btn-standard" onclick="resolveMove('move_1')">Move 1 Step</button>
                `;
            } else if (card.action === 'split_7') {
                popup.style.display = 'flex';
                title.innerText = "Card 7: Split Moves (Select Marble then Steps)";
                btns.innerHTML = `
                    <button class="btn-standard" onclick="alert('Select Marble 1')">Select Marble 1</button>
                    <button class="btn-standard" onclick="alert('Select Marble 2')">Select Marble 2</button>
                    <p style="font-size:0.8rem; margin-top:10px; color:#aaa;">Click marbles on board to set steps</p>
                `;
            } else if (card.action === 'choice_ten') {
                popup.style.display = 'flex';
                title.innerText = "Card 10: Action";
                btns.innerHTML = `
                    <button class="btn-standard" onclick="resolveMove('move_10')">Move 10</button>
                    <button class="btn-standard" style="background:var(--danger)" onclick="burnNext()">Burn Next Player</button>
                `;
            } else if (card.action === 'burn_q') {
                 // 'Bint' Card: I choose what to burn
                 alert("Select the card you want to burn from the next player's hand.");
                 // Logic: Highlight opponent's hand
            } else {
                // Simple move cards (2, 4, 11)
                alert(`Card ${card.v}: Select a marble to move.`);
            }
        }

        window.resolveMove = (type) => {
            document.getElementById('choice-popup').style.display = 'none';
            alert(`Action: ${type} executed. Select marble on board.`);
            // Here we would highlight valid marbles.
        }

        window.burnNext = () => {
            document.getElementById('choice-popup').style.display = 'none';
            alert("Next player must discard a random card!");
        }

    </script>
</body>
