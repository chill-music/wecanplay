<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameZone - Jackaroo</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/clouds/100/controller.png" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ffaa; --primary-glow: rgba(0, 255, 170, 0.4);
            --secondary: #ff6b35; --dark: #0a0a12; --darker: #050508;
            --card-bg: #12121a; --light: #e8e8e8; --muted: #6b7280;
            --red: #ff3d3d; --blue: #3d9eff; --green: #3dff6a; --yellow: #ffde3d;
            --gold: #ffd700;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark); 
            color: var(--light); 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* --- Animated Background --- */
        .bg-effects {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .bg-gradient {
            position: absolute; width: 150%; height: 150%; top: -25%; left: -25%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 255, 170, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 107, 53, 0.06) 0%, transparent 50%);
            animation: bgPulse 15s ease-in-out infinite;
        }
        @keyframes bgPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        /* --- Navigation --- */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; 
            background: rgba(10, 10, 18, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 255, 170, 0.1);
            position: relative; z-index: 100;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; color: var(--light); letter-spacing: 2px; }
        .logo span { color: var(--primary); text-shadow: 0 0 20px var(--primary-glow); }
        .btn-standard { background: linear-gradient(135deg, var(--primary), #00cc88); border: none; color: var(--dark); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; font-family: 'Rajdhani', sans-serif; transition: 0.2s; }
        .btn-standard:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--primary-glow); }
        
        /* --- Main Container --- */
        .container { padding: 30px 5%; display: flex; gap: 30px; flex-wrap: wrap; position: relative; z-index: 1; }
        
        /* --- Profile Card --- */
        .profile-card { flex: 1; min-width: 300px; background: rgba(18, 18, 26, 0.8); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .avatar-box { width: 100px; height: 100px; margin: 0 auto 15px; position: relative; }
        .avatar-box img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; text-align: center; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--primary); }

        /* --- Lobby Section --- */
        .lobby-section { flex: 2; min-width: 300px; }
        .join-room-box { background: rgba(18, 18, 26, 0.8); padding: 20px; border-radius: 15px; margin-bottom: 30px; display: flex; gap: 15px; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .join-room-box input { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid #333; background: #222; color: white; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .game-card { background: linear-gradient(145deg, #1a1a2e, #16213e); border-radius: 15px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* --- GAME ROOM --- */
        #game-room { display: none; height: 100vh; width: 100%; background: #1a1f2c; position: relative; overflow: hidden; flex-direction: column; }
        
        .game-info-panel { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; width: 220px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); z-index: 10; }
        .room-code-display { font-size: 1.8rem; font-weight: bold; color: var(--primary); letter-spacing: 3px; text-align: center; }
        
        /* --- Board Layout --- */
        .board-area { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; padding-bottom: 120px; }
        .board-wrapper { width: 600px; height: 600px; position: relative; background: #ecf0f1; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Bases */
        .base-zone { position: absolute; width: 200px; height: 200px; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .base-zone.red { top: 0; left: 0; background: #e74c3c; border-radius: 15px 0 50px 0; }
        .base-zone.blue { top: 0; right: 0; background: #3498db; border-radius: 0 15px 0 50px; }
        .base-zone.green { bottom: 0; right: 0; background: #27ae60; border-radius: 0 50px 0 15px; }
        .base-zone.yellow { bottom: 0; left: 0; background: #f1c40f; border-radius: 50px 0 0 15px; }
        
        .player-label { font-weight: bold; color: white; margin-bottom: 10px; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        
        .home-marbles-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; }
        .marble-placeholder { width: 35px; height: 35px; background: rgba(255,255,255,0.3); border-radius: 50%; border: 2px dashed rgba(255,255,255,0.5); display: flex; justify-content: center; align-items: center; }
        
        .marble { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; transition: all 0.2s; box-shadow: inset -2px -2px 5px rgba(0,0,0,0.3), inset 2px 2px 5px rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.4); }
        .marble:hover { transform: scale(1.2); box-shadow: 0 0 15px white; }
        .marble.m-red { background: #c0392b; }
        .marble.m-blue { background: #2980b9; }
        .marble.m-green { background: #1e8449; }
        .marble.m-yellow { background: #d4ac0d; }

        /* Finish Zone */
        .finish-zone { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; background: #2c3e50; border-radius: 50%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; padding: 10px; z-index: 5; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }

        /* Track Points */
        .track-point { position: absolute; width: 22px; height: 22px; background: #bdc3c7; border-radius: 50%; border: 1px solid #95a5a6; font-size: 8px; display: flex; align-items: center; justify-content: center; color: #333; z-index: 2; }
        .track-point.colored { border: 3px solid; background: white; }
        .track-point.colored.red { border-color: var(--red); }
        .track-point.colored.blue { border-color: var(--blue); }
        .track-point.colored.green { border-color: var(--green); }
        .track-point.colored.yellow { border-color: var(--yellow); }

        /* --- Cards UI --- */
        .hand-container { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.9); padding: 15px 20px; border-radius: 20px; z-index: 20; border: 2px solid #333; max-width: 95vw; overflow-x: auto; }
        
        .card { width: 70px; height: 100px; background: white; border-radius: 8px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 10px rgba(0,0,0,0.3); position: relative; flex-shrink: 0; }
        .card:hover { transform: translateY(-15px); box-shadow: 0 10px 20px rgba(108, 92, 231, 0.5); }
        .card-value { font-size: 2.2rem; color: #333; line-height: 1; }
        .card-desc { font-size: 0.55rem; color: #666; text-align: center; width: 100%; background: #eee; padding: 3px; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }
        
        .card.selected { border: 3px solid var(--gold); transform: translateY(-20px); }
        
        /* Card specific colors */
        .card.c-red { border-top: 5px solid var(--red); }
        .card.c-blue { border-top: 5px solid var(--blue); }
        .card.c-green { border-top: 5px solid var(--green); }
        .card.c-yellow { border-top: 5px solid var(--yellow); }

        /* Popups */
        .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(5px); }
        .popup-content { background: var(--card-bg); padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; text-align: center; border: 1px solid var(--primary); box-shadow: 0 0 30px var(--primary-glow); }
        .popup-title { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; margin-bottom: 20px; color: var(--primary); }
        
        /* Split 7 Input */
        .split-input-group { display: flex; gap: 10px; justify-content: center; align-items: center; margin: 15px 0; }
        .split-input-group input { width: 60px; padding: 10px; text-align: center; font-size: 1.2rem; border-radius: 8px; border: 1px solid #444; background: #222; color: white; }

        /* Queen Burn Animation */
        .hidden-cards-grid { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .hidden-card { width: 60px; height: 90px; background: linear-gradient(135deg, #2c3e50, #000); border-radius: 8px; cursor: pointer; border: 2px solid #444; transition: 0.2s; }
        .hidden-card:hover { border-color: var(--danger); transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="bg-effects">
        <div class="bg-gradient"></div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" style="display: none; height: 100vh; justify-content: center; align-items: center;">
        <div style="text-align: center;">
            <div class="logo" style="margin-bottom: 20px;">Game<span>Zone</span></div>
            <button id="google-login-btn" class="btn-standard" style="font-size: 1.1rem; padding: 15px 30px;">Sign in with Google</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" style="display: none;">
        <nav>
            <div class="logo-container">
                <div class="logo">Game<span>Zone</span></div>
            </div>
            <div class="nav-right">
                <div style="color: var(--gold); font-weight: bold;">🪙 <span id="nav-coins">0</span></div>
                <div class="user-mini" style="display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.1); padding:5px 15px; border-radius:20px;">
                    <img id="nav-avatar" src="https://i.pravatar.cc/150" alt="Avatar" style="width:30px; height:30px; border-radius:50%;">
                    <span id="nav-name">User</span>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="profile-card">
                <div class="avatar-box">
                    <img id="profile-avatar" src="https://i.pravatar.cc/150" alt="Avatar">
                </div>
                <h2 id="profile-name" style="text-align: center;">Loading...</h2>
                <div class="stats-grid">
                    <div class="stat-box"><div class="stat-val" id="stat-wins">0</div><div class="stat-label">Wins</div></div>
                    <div class="stat-box"><div class="stat-val" id="stat-losses">0</div><div class="stat-label">Loss</div></div>
                    <div class="stat-box"><div class="stat-val" id="stat-coins" style="color:var(--gold)">0</div><div class="stat-label">Coins</div></div>
                </div>
            </div>

            <div class="lobby-section">
                <div class="join-room-box">
                    <input type="text" id="join-code-input" placeholder="ENTER ROOM CODE" maxlength="4">
                    <button class="btn-standard" onclick="joinRoom()">Join Game</button>
                </div>

                <h2 class="section-title" style="font-size: 1.5rem; margin-bottom: 20px; border-left: 4px solid var(--primary); padding-left: 15px;">Choose Your Game</h2>
                <div class="game-grid">
                    <div class="game-card" onclick="createRoom('jackaroo')">
                        <div class="game-header" style="height: 120px; background: url('https://images.unsplash.com/photo-1606167668584-78701c57f13d?auto=format&fit=crop&w=400') center/cover;">
                            <div style="position: absolute; bottom: 10px; left: 10px; font-size: 1.4rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">Jackaroo</div>
                        </div>
                        <div style="padding: 15px;">
                            <p style="font-size:0.85rem; color:#aaa; margin-bottom:10px;">Strategic marble game. Move your 4 marbles home.</p>
                            <button class="btn-standard" style="width:100%;">Play Now</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- GAME ROOM -->
    <div id="game-room">
        <div class="game-info-panel">
            <div style="text-transform:uppercase; font-size:0.8rem; color:#aaa; text-align:center;">Room Code</div>
            <div class="room-code-display" id="room-code-display">A1B2</div>
            <button class="btn-standard" onclick="copyRoomCode()" style="width:100%; margin-bottom: 15px; padding: 5px; font-size: 0.8rem;">Copy Code</button>
            <div style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; text-align: center;">
                <div style="font-size:0.8rem; color:#aaa;">Turn</div>
                <div id="turn-name" style="font-weight:bold; color:var(--primary);">Player 1</div>
            </div>
            <button onclick="exitGame()" style="margin-top:15px; width:100%; background: #e74c3c; border:none; padding:8px; border-radius:5px; color:white; cursor:pointer;">Exit Room</button>
        </div>

        <div class="board-area">
            <div class="board-wrapper" id="board-wrapper">
                <!-- Red Base -->
                <div class="base-zone red">
                    <div class="player-label">Player 1</div>
                    <div class="home-marbles-grid" id="home-red"></div>
                </div>
                <!-- Blue Base -->
                <div class="base-zone blue">
                    <div class="player-label">Player 2</div>
                    <div class="home-marbles-grid" id="home-blue"></div>
                </div>
                <!-- Green Base -->
                <div class="base-zone green">
                    <div class="player-label">Player 3</div>
                    <div class="home-marbles-grid" id="home-green"></div>
                </div>
                <!-- Yellow Base -->
                <div class="base-zone yellow">
                    <div class="player-label">Player 4</div>
                    <div class="home-marbles-grid" id="home-yellow"></div>
                </div>
                <!-- Finish -->
                <div class="finish-zone"></div>
            </div>
        </div>

        <div class="hand-container" id="player-hand"></div>
    </div>

    <!-- Popups -->
    <div id="choice-popup" class="popup">
        <div class="popup-content">
            <div class="popup-title" id="popup-title">Choose Action</div>
            <div id="popup-body"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4_l9ZUfCzRAZfqC1-7eWhnp8ftMFbKmM",
            authDomain: "appforgames-d392f.firebaseapp.com",
            projectId: "appforgames-d392f",
            storageBucket: "appforgames-d392f.firebasestorage.app",
            messagingSenderId: "586730925650",
            appId: "1:586730925650:web:d452dd19248780578f798b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Views
        const loginScreen = document.getElementById('login-screen');
        const mainApp = document.getElementById('main-app');
        const gameRoom = document.getElementById('game-room');
        const popup = document.getElementById('choice-popup');
        const popupTitle = document.getElementById('popup-title');
        const popupBody = document.getElementById('popup-body');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loginScreen.style.display = 'none';
                mainApp.style.display = 'block';
                gameRoom.style.display = 'none';
                updateMainUI(user);
            } else {
                loginScreen.style.display = 'flex';
                mainApp.style.display = 'none';
                gameRoom.style.display = 'none';
            }
        });

        function updateMainUI(user) {
            document.getElementById('nav-avatar').src = user.photoURL;
            document.getElementById('nav-name').innerText = user.displayName;
            document.getElementById('profile-avatar').src = user.photoURL;
            document.getElementById('profile-name').innerText = user.displayName;
        }
        
        document.getElementById('google-login-btn').addEventListener('click', () => signInWithPopup(auth, provider));
        window.signOutUser = () => signOut(auth);

        // --- Game Logic ---

        const allCards = [
            { v: "A", d: "Out/1", action: "ace", color: "red" },
            { v: "2", d: "Move 2", action: "move", steps: 2, color: "blue" },
            { v: "3", d: "Move 3", action: "move", steps: 3, color: "green" },
            { v: "4", d: "Back 4", action: "back", steps: 4, color: "yellow" },
            { v: "5", d: "Move 5", action: "move", steps: 5, color: "red" },
            { v: "6", d: "Move 6", action: "move", steps: 6, color: "blue" },
            { v: "7", d: "Split 7", action: "split", steps: 7, color: "green" },
            { v: "8", d: "Move 8", action: "move", steps: 8, color: "yellow" },
            { v: "9", d: "Move 9", action: "move", steps: 9, color: "red" },
            { v: "10", d: "10/Burn", action: "ten", steps: 10, color: "blue" },
            { v: "J", d: "Move 11", action: "move", steps: 11, color: "green" },
            { v: "Q", d: "Burn Card", action: "queen", color: "yellow" },
            { v: "K", d: "Out/13/Kill", action: "king", steps: 13, color: "red" }
        ];

        let playerHand = [];

        function generateShortCode() { return Math.random().toString(36).substr(2, 4).toUpperCase(); }
        
        window.createRoom = (gameName) => {
            if(gameName === 'jackaroo') {
                initGameBoard(generateShortCode());
            }
        }
        
        window.joinRoom = () => {
            const code = document.getElementById('join-code-input').value;
            if(code) initGameBoard(code.toUpperCase());
        }

        function initGameBoard(code) {
            mainApp.style.display = 'none';
            gameRoom.style.display = 'flex';
            document.getElementById('room-code-display').innerText = code;
            drawBoard();
            dealCards();
        }

        window.exitGame = () => {
            gameRoom.style.display = 'none';
            mainApp.style.display = 'block';
        }
        
        window.copyRoomCode = () => {
            navigator.clipboard.writeText(document.getElementById('room-code-display').innerText);
            alert("Code Copied!");
        }

        // --- DRAW BOARD ---
        function drawBoard() {
            const wrapper = document.getElementById('board-wrapper');
            wrapper.innerHTML = ''; // Clear previous

            // Recreate Bases
            const bases = [
                { id: 'home-red', cls: 'red', label: 'Player 1' },
                { id: 'home-blue', cls: 'blue', label: 'Player 2' },
                { id: 'home-green', cls: 'green', label: 'Player 3' },
                { id: 'home-yellow', cls: 'yellow', label: 'Player 4' }
            ];

            bases.forEach(b => {
                const div = document.createElement('div');
                div.className = `base-zone ${b.cls}`;
                div.innerHTML = `
                    <div class="player-label">${b.label}</div>
                    <div class="home-marbles-grid" id="${b.id}">
                        ${Array(4).fill('<div class="marble-placeholder"><div class="marble m-' + b.cls + '"></div></div>').join('')}
                    </div>
                `;
                wrapper.appendChild(div);
            });

            // Finish Zone
            const finish = document.createElement('div');
            finish.className = 'finish-zone';
            wrapper.appendChild(finish);

            // Draw Track (Simplified Circular representation)
            // For a real game, we'd use exact coordinates. Here we use a simplified loop.
            const totalPoints = 60;
            for(let i = 0; i < totalPoints; i++) {
                const pt = document.createElement('div');
                pt.className = 'track-point';
                pt.id = `track-${i}`;
                
                // Position calculation (Rough square loop)
                let top, left;
                const margin = 35; // %
                const size = 600; // board px

                if (i < 15) { // Top edge (Left to Right)
                    top = 20; left = margin + (i * 2.5);
                } else if (i < 30) { // Right edge (Top to Bottom)
                    top = 20 + ((i-15) * 2.5); left = 95;
                } else if (i < 45) { // Bottom edge (Right to Left)
                    top = 95; left = 95 - ((i-30) * 2.5);
                } else { // Left edge (Bottom to Top)
                    top = 95 - ((i-45) * 2.5); left = margin;
                }
                
                pt.style.top = top + '%';
                pt.style.left = left + '%';
                pt.style.transform = 'translate(-50%, -50%)';
                
                wrapper.appendChild(pt);
            }
        }

        // --- CARDS ---
        function dealCards() {
            playerHand = [];
            const handContainer = document.getElementById('player-hand');
            handContainer.innerHTML = '';

            for(let i=0; i<4; i++) {
                const randomCard = {...allCards[Math.floor(Math.random() * allCards.length)]};
                playerHand.push(randomCard);
                
                const cardEl = document.createElement('div');
                cardEl.className = `card c-${randomCard.color}`;
                cardEl.innerHTML = `
                    <div class="card-value">${randomCard.v}</div>
                    <div class="card-desc">${randomCard.d}</div>
                `;
                cardEl.onclick = () => playCard(randomCard, cardEl);
                handContainer.appendChild(cardEl);
            }
        }

        function playCard(card, element) {
            // Highlight
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');

            // Logic based on rules
            if (card.action === 'ace') {
                showPopup("Card A", `
                    <p>Choose your move:</p>
                    <button class="btn-standard" onclick="executeMove('out')">Bring Marble Out</button>
                    <button class="btn-standard" onclick="executeMove(1)">Move 1 Step</button>
                `);
            } 
            else if (card.action === 'split') {
                showPopup("Card 7: Split Moves", `
                    <p>Distribute 7 steps on your marbles:</p>
                    <div class="split-input-group">
                        <input type="number" id="split-m1" placeholder="M1" min="0" max="7">
                        <span>+</span>
                        <input type="number" id="split-m2" placeholder="M2" min="0" max="7">
                    </div>
                    <p style="font-size:0.8rem; color:#aaa;">Sum must be 7</p>
                    <button class="btn-standard" onclick="executeSplit()">Confirm</button>
                `);
            }
            else if (card.action === 'ten') {
                showPopup("Card 10", `
                    <p>Choose Action:</p>
                    <button class="btn-standard" onclick="executeMove(10)">Move 10 Steps</button>
                    <button class="btn-standard" style="background:var(--danger)" onclick="executeBurnSelection()">Burn Next Player</button>
                `);
            }
            else if (card.action === 'queen') {
                // Queen: Burn random card from opponent
                // Simulating opponent hand
                showPopup("Card Q: Burn Enemy Card", `
                    <p>Choose a hidden card to burn:</p>
                    <div class="hidden-cards-grid">
                        <div class="hidden-card" onclick="revealBurn(0)"></div>
                        <div class="hidden-card" onclick="revealBurn(1)"></div>
                        <div class="hidden-card" onclick="revealBurn(2)"></div>
                    </div>
                `, 500);
            }
            else if (card.action === 'king') {
                 showPopup("Card K", `
                    <p>Choose your move (Kills anything in path):</p>
                    <button class="btn-standard" onclick="executeMove('out')">Bring Marble Out</button>
                    <button class="btn-standard" onclick="executeMove(13, true)">Move 13 (Bulldozer)</button>
                `);
            }
            else if (card.action === 'back') {
                alert(`Card 4: Select marble to move back ${card.steps} steps.`);
                closePopup();
            }
            else {
                // Standard move
                alert(`Card ${card.v}: Select marble to move ${card.steps} steps.`);
                closePopup();
            }
        }

        function showPopup(title, content, width = 400) {
            popupTitle.innerText = title;
            popupBody.innerHTML = content;
            popup.querySelector('.popup-content').style.maxWidth = width + 'px';
            popup.style.display = 'flex';
        }

        window.closePopup = () => {
            popup.style.display = 'none';
        };

        // --- Action Handlers ---

        window.executeMove = (steps, isKing = false) => {
            closePopup();
            const msg = isKing ? `King moving 13 steps. All marbles in path will be killed!` : `Select marble to move ${steps} steps.`;
            alert(msg);
            // Here we would switch to "Select Marble Mode" on the board
        };

        window.executeSplit = () => {
            const m1 = parseInt(document.getElementById('split-m1').value);
            const m2 = parseInt(document.getElementById('split-m2').value);
            if(m1 + m2 === 7) {
                alert(`Moving Marble 1: ${m1} steps and Marble 2: ${m2} steps.`);
                closePopup();
            } else {
                alert("Total must be exactly 7!");
            }
        };

        window.executeBurnSelection = () => {
            closePopup();
            // In real game, target next player.
            // For demo: We simulate the opponent choosing a card to discard.
            showPopup("Opponent Turn", `
                <p style="color:var(--danger)">You have been burned!</p>
                <p>Select a card from your hand to discard:</p>
                <div style="display:flex; gap:10px; justify-content:center; margin-top:15px;">
                    <button class="btn-standard" onclick="alert('Card Discarded!'); closePopup();">Card A</button>
                    <button class="btn-standard" onclick="alert('Card Discarded!'); closePopup();">Card 5</button>
                </div>
            `);
        };

        window.revealBurn = (index) => {
            // Queen logic: Randomly burn
            const burnedCard = allCards[Math.floor(Math.random() * allCards.length)];
            showPopup("Card Burned!", `
                <p>The enemy lost:</p>
                <div style="font-size: 3rem; margin: 20px;">${burnedCard.v}</div>
                <p style="color: #aaa">${burnedCard.d}</p>
                <button class="btn-standard" onclick="closePopup()">Nice!</button>
            `);
        };

    </script>
</body>
</html>
